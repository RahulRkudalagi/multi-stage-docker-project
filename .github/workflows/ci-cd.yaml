name: CI-CD

on:
  push:
    branches: [ main, master ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    env:
      IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/multi-stage-docker-app
      TAG: ${{ github.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build optimized image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: docker/Dockerfile.optimized
          push: false
          tags: ${{ env.IMAGE_NAME }}:optimized-${{ env.TAG }}

      - name: Build normal image
        run: |
          docker build -f docker/Dockerfile.normal -t ${{ env.IMAGE_NAME }}:normal-${{ env.TAG }} .

      - name: Show image sizes (local)
        run: |
          docker images --format "{{.Repository}}:{{.Tag}} {{.Size}}" | grep multi-stage-docker-app || true

      - name: Trivy scan optimized image
        uses: aquasecurity/trivy-action@v1
        with:
          image-ref: ${{ env.IMAGE_NAME }}:optimized-${{ env.TAG }}
          format: 'table'
          exit-code: '1'
          severity: 'HIGH,CRITICAL'

      - name: Trivy scan normal image
        uses: aquasecurity/trivy-action@v1
        with:
          image-ref: ${{ env.IMAGE_NAME }}:normal-${{ env.TAG }}
          format: 'table'
          exit-code: '0'
          severity: 'HIGH,CRITICAL'

      - name: Push optimized image to DockerHub
        uses: docker/build-push-action@v4
        with:
          context: .
          file: docker/Dockerfile.optimized
          push: true
          tags: ${{ env.IMAGE_NAME }}:latest,${{ env.IMAGE_NAME }}:optimized-${{ env.TAG }}

      - name: Push normal image to DockerHub
        run: |
          docker push ${{ env.IMAGE_NAME }}:normal-${{ env.TAG }} || true

      - name: Done
        run: echo "Build and push completed"

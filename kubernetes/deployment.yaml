apiVersion: apps/v1
kind: Deployment

metadata:
  name: multi-stage-app
  namespace: course-project
  labels:
    app: multi-stage-app

spec:
  replicas: 2

  selector:
    matchLabels:
      app: multi-stage-app

  template:
    metadata:
      labels:
        app: multi-stage-app
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3000"

    spec:
      containers:
        - name: app
          image: optimized-app:latest
          imagePullPolicy: IfNotPresent

          ports:
            - containerPort: 3000

          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"

            limits:
              cpu: "500m"
              memory: "256Mi"